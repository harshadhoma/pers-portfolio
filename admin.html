<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HR // ADMIN TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#050506;--gun:#12161c;--panel:#161b22;--line:#262e38;--line-2:#323c48;--gold:#ffb020;--cyan:#33e6e6;--crimson:#e22424;--fog:#8a96a3;--bone:#e8eaed;--disp:"Rajdhani",sans-serif;--mono:"Share Tech Mono",monospace;--body:"Inter",sans-serif;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--black);color:var(--bone);font-family:var(--body);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:6vh 16px;}
  body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.18) 3px,transparent 4px);pointer-events:none;opacity:.5;}
  .shell{width:100%;max-width:760px;position:relative;z-index:1;}
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
  .crest{width:40px;height:44px;background:var(--gold);clip-path:polygon(50% 0,100% 22%,100% 78%,50% 100%,0 78%,0 22%);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;color:#000;font-size:18px;}
  .brand b{font-family:var(--disp);font-weight:700;letter-spacing:.18em;font-size:18px;display:block;}
  .brand small{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--cyan);}
  .panel{background:linear-gradient(145deg,var(--panel),var(--gun));border:1px solid var(--line);clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));padding:30px;}
  h2{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin:0 0 6px;color:var(--gold);}
  .hint{font-family:var(--mono);font-size:11px;color:var(--fog);letter-spacing:.08em;margin-bottom:24px;}
  label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin:18px 0 8px;}
  input,textarea,select{width:100%;background:var(--black);border:1px solid var(--line-2);padding:12px 14px;color:var(--bone);font-family:var(--body);font-size:15px;outline:none;transition:border-color .2s;}
  input:focus,textarea:focus,select:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:200px;font-family:var(--mono);font-size:13px;line-height:1.6;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .btn{font-family:var(--disp);font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:14px;padding:14px 28px;background:var(--gold);color:#000;border:none;cursor:pointer;clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:background .2s;}
  .btn:hover{background:#ffce5c;}
  .btn-ghost{background:none;border:1px solid var(--line-2);color:var(--fog);}
  .btn-ghost:hover{color:var(--bone);border-color:var(--crimson);}
  .bar{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px;}
  .msg{font-family:var(--mono);font-size:12px;letter-spacing:.08em;margin-top:18px;min-height:18px;}
  .msg.ok{color:var(--gold);} .msg.err{color:var(--crimson);}
  .ck{display:flex;align-items:center;gap:10px;margin-top:18px;font-family:var(--mono);font-size:12px;color:var(--fog);}
  .ck input{width:auto;}
  .note{font-family:var(--mono);font-size:11px;color:var(--fog);background:rgba(51,230,230,.05);border:1px solid var(--line);padding:12px 14px;margin-top:18px;line-height:1.6;}
  .hide{display:none;}
  a.home{font-family:var(--mono);font-size:11px;color:var(--cyan);letter-spacing:.12em;}
</style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <span class="crest">HR</span>
    <span><b>ADMIN TERMINAL</b><small>● RESTRICTED ACCESS</small></span>
  </div>

  <!-- LOGIN -->
  <div class="panel" id="loginPanel">
    <h2>Authenticate</h2>
    <div class="hint">// sign in to write to the archive</div>
    <label for="email">Operator ID (email)</label>
    <input id="email" type="email" autocomplete="username" />
    <label for="password">Passphrase</label>
    <input id="password" type="password" autocomplete="current-password" />
    <div class="bar"><a class="home" href="/">◂ back to site</a><button class="btn" id="loginBtn">Access</button></div>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- EDITOR -->
  <div class="panel hide" id="editorPanel">
    <h2>New Transmission</h2>
    <div class="hint" id="who">// authenticated</div>
    <label for="title">Title</label>
    <input id="title" />
    <div class="row">
      <div><label for="category">Category</label><input id="category" placeholder="e.g. Spark · Performance" /></div>
      <div><label for="read">Read time</label><input id="read" placeholder="e.g. 6 min" /></div>
    </div>
    <label for="excerpt">Excerpt (card preview)</label>
    <input id="excerpt" />
    <label for="body">Body</label>
    <textarea id="body" placeholder="Basic HTML works: <h2>Section</h2> <p>text</p> <ul><li>..</li></ul> <pre>code</pre>"></textarea>
    <div class="note">Tip: wrap paragraphs in &lt;p&gt;…&lt;/p&gt;, headings in &lt;h2&gt;…&lt;/h2&gt;, and code blocks in &lt;pre&gt;…&lt;/pre&gt;. It renders styled on the blog.</div>
    <div class="ck"><input type="checkbox" id="published" checked /><label for="published" style="margin:0;color:var(--fog)">Publish immediately</label></div>
    <div class="bar"><button class="btn btn-ghost" id="logoutBtn">Sign out</button><button class="btn" id="publishBtn">Transmit Post</button></div>
    <div class="msg" id="editorMsg"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  /* ============================================================
     >>> EDIT THESE TWO LINES after you create your Supabase project.
     The anon key is safe to expose in client code (RLS protects data).
     Find them in Supabase → Project Settings → API.
     ============================================================ */
  const SUPABASE_URL = 'https://rfiwdrveuaxaudssowmu.supabase.co/rest/v1/';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmaXdkcnZldWF4YXVkc3Nvd211Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTYwNzIsImV4cCI6MjA5NzI5MjA3Mn0.HWVyn8KK27nU4E5nt0dGWtlvPMTgpmHrdCfwxf6q0dw';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = id => document.getElementById(id);
  const loginPanel = $('loginPanel'), editorPanel = $('editorPanel');

  async function refresh() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      loginPanel.classList.add('hide');
      editorPanel.classList.remove('hide');
      $('who').textContent = '// authenticated as ' + session.user.email;
    } else {
      loginPanel.classList.remove('hide');
      editorPanel.classList.add('hide');
    }
  }
  refresh();

  // ---- login ----
  $('loginBtn').addEventListener('click', async () => {
    const msg = $('loginMsg'); msg.className = 'msg'; msg.textContent = '// authenticating...';
    const { error } = await supabase.auth.signInWithPassword({
      email: $('email').value.trim(),
      password: $('password').value,
    });
    if (error) { msg.className = 'msg err'; msg.textContent = '// ' + error.message; return; }
    msg.className = 'msg ok'; msg.textContent = '// access granted';
    refresh();
  });

  // ---- logout ----
  $('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); refresh(); });

  // ---- publish ----
  $('publishBtn').addEventListener('click', async () => {
    const msg = $('editorMsg'); msg.className = 'msg';
    const title = $('title').value.trim(), body = $('body').value.trim();
    if (!title || !body) { msg.className = 'msg err'; msg.textContent = '// title and body required'; return; }
    msg.textContent = '// transmitting...';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { msg.className = 'msg err'; msg.textContent = '// session expired — sign in again'; refresh(); return; }

    const r = await fetch('/api/posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + session.access_token },
      body: JSON.stringify({
        title,
        category: $('category').value.trim(),
        excerpt: $('excerpt').value.trim(),
        read_time: $('read').value.trim(),
        body,
        published: $('published').checked,
      }),
    });

    if (!r.ok) { const e = await r.json().catch(()=>({})); msg.className = 'msg err'; msg.textContent = '// failed: ' + (e.error || r.status); return; }
    msg.className = 'msg ok'; msg.textContent = '// post published — check the blog';
    ['title','category','read','excerpt','body'].forEach(id => $(id).value = '');
  });
</script>
</body>
</html>
